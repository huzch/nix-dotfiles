##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
  name = float-pwvucontrol
  match:class = com.saivert.pwvucontrol
  float = on
  size = 800 600
  center = on
}

windowrule {
  name = float-nm-connection-editor
  match:class = nm-connection-editor
  float = on
  size = 800 600
  center = on
}

windowrule {
  name = float-blueman-manager
  match:class = .blueman-manager-wrapped
  float = on
  size = 800 600
  center = on
}

windowrule {
  name = float-fcitx
  match:class = org.fcitx.
  float = on
  size = 800 600
  center = on
}

windowrule {
  name = float-clash
  match:class = clash-verge
  float = on
  size = 900 700
  center = on
}

windowrule {
  name = float-xdg-desktop-portal-gtk
  match:class = xdg-desktop-portal-gtk
  float = on
  size = 800 600
  center = on
}

windowrule {
  name = float-wechat-menu
  match:class = wechat
	match:title = wechat
	border_size = 0
	no_anim = on
	no_blur = on
}

windowrule {
  name = float-wechat
  # match:class = wechat
	match:title = 微信
  float = on
  size = 900 700
  center = on
	no_anim = on
}

windowrule {
  name = float-wechat-setting
  match:class = wechat
	match:title = 设置
  float = on
  size = 600 500
  center = on
	no_anim = on
}

windowrule {
    name = disable-blur-menus
    match:class = ^$
    match:title = ^$
    no_blur = on
}
